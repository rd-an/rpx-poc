<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPX POC - 功能展示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      width: 100%;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .poc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .poc-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .poc-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.15);
    }
    .poc-card h2 {
      color: #667eea;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    .poc-card p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .poc-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .poc-card .tag {
      background: #f0f0f0;
      color: #555;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
    }
    .footer {
      text-align: center;
      color: white;
      margin-top: 40px;
      opacity: 0.9;
    }
    @media (max-width: 640px) {
      h1 {
        font-size: 1.8rem;
      }
      .poc-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RPX POC 功能展示</h1>
    
    <div class="poc-grid">
      <a href="./kb-audit/" class="poc-card">
        <h2>KB Audit</h2>
        <p>系統更新與弱點管理稽核工具，提供安裝狀態追蹤與 KB 稽核功能。</p>
        <div class="tags">
          <span class="tag">Vue 3</span>
          <span class="tag">Vite</span>
          <span class="tag">Tailwind CSS</span>
        </div>
      </a>

      <!-- 未來新增的 POC 可以在這裡加入 -->
      <!-- 
      <a href="./another-poc/" class="poc-card">
        <h2>Another POC</h2>
        <p>POC 功能描述</p>
        <div class="tags">
          <span class="tag">技術標籤</span>
        </div>
      </a>
      -->
    </div>

    <div class="footer">
      <p>© 2026 RPX POC Project</p>
    </div>
  </div>
</body>
</html>
